services:
  - type: web
    name: voluntarios-api
    runtime: node
    rootDir: voluntarios-api
    buildCommand: npm ci && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
